version: 2

# ──────────────────────────────────────────────────────────────────────────
# Déclaration des tables RAW ingérées par Airbyte depuis Sellsy V2.
# Chaque entrée donne à dbt un alias `source('sellsy', 'XXX')` qu'on peut
# utiliser dans les models staging.
#
# Le schéma `raw` côté Postgres a été créé par notre init SQL.
# Airbyte y dépose les tables au nom du stream (ex: stream `invoices`
# → table `raw.invoices`).
# ──────────────────────────────────────────────────────────────────────────

sources:
  - name: sellsy
    description: "Données brutes Sellsy V2 ingérées par Airbyte"
    schema: raw
    tables:
      # Top-level documents
      - name: invoices
        description: "Factures (POST /v2/invoices/search)"
      - name: credit_notes
        description: "Avoirs"
      - name: deliveries
        description: "Bons de livraison"
      - name: orders
        description: "Commandes (BDC)"
      - name: estimates
        description: "Devis"
      - name: deposit_invoices
        description: "Factures d'acompte"
      # progress_invoices : non extractibles via Sellsy V2 (API expose
      # uniquement POST pour création, pas de GET ni search). Drop intentionnel.
      - name: opportunities
        description: "Opportunités commerciales"

      # Détails (child streams - contiennent rows / amounts détaillés)
      - name: invoice_details
      - name: credit_note_details
      - name: delivery_details
      - name: order_details

      # Tiers
      - name: companies
      - name: individuals
      - name: contacts

      # Paiements (top-level search) — source unique des paiements, on extrait
      # le mapping invoice→payment depuis payments.related_objects[]
      # (cf. stg_sellsy__invoice_payments). Évite 50k calls N+1 vs stream
      # invoice_payments supprimé.
      - name: payments
        description: "Paiements (POST /v2/payments/search)"

      # Custom fields : SUPPRIMÉS (2026-05-30). Tous les CFs sont maintenant
      # récupérés via embed[]=cf.X sur les URLs parents (companies, invoices,
      # credit_notes, orders, deliveries, estimates, deposit_invoices,
      # opportunities). 21 CFs Cashpad cartographiés, ~70k calls API/sync
      # économisés. Les valeurs des CFs sont dans <parent>._embed.custom_fields[].
      # Voir stg_sellsy__custom_fields_values.sql pour l'unnest générique.
      # company_smart_tags également supprimé (companies._embed.smart_tags
      # via embed=smart_tags sur le parent).

      # Référentiels
      - name: custom_fields_definitions
      - name: rate_categories
      - name: catalogue_categories
      - name: catalogue_items
      - name: catalogue_services
