          https://api.sellsy.com/v2/invoices/search?embed[]=acl&embed[]=owner&embed[]=related&embed[]=fiscal_year&embed[]=currency&embed[]=smart_tags&embed[]=deposits&embed[]=invoicing_address&embed[]=delivery_address&embed[]=issuer_address&embed[]=payment_method_ids
        http_method: POST
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        request_body_json:
          filters:
            created:
              start: "{{ (now_utc() - duration('P' + (config['lookback_days']|string) + 'D')).strftime('%Y-%m-%dT%H:%M:%S+00:00') }}"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
