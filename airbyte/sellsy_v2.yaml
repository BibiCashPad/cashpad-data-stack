version: 7.10.0

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - invoices

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: OAuthAuthenticator
        client_id: "{{ config['client_id'] }}"
        grant_type: client_credentials
        client_secret: "{{ config['client_secret'] }}"
        refresh_request_body: {}
        token_refresh_endpoint: https://login.sellsy.com/oauth2/access-tokens
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: offset
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 100
          cursor_value: "{{ response.pagination.offset }}"
          stop_condition: "{{ response.pagination.count < response.pagination.limit }}"

streams:
  - type: DeclarativeStream
    name: invoices
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      requester:
