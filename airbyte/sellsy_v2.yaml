spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
    - client_id
    - client_secret
    properties:
      client_id:
        type: string
        order: 0
        title: Client ID
        airbyte_secret: true
      client_secret:
        type: string
        order: 1
        title: Client secret
        airbyte_secret: true
      lookback_days:
        type: string
        order: 2
        title: Lookback period (days)
        default: "36500"
        pattern: "^[0-9]+$"
        description: 'Pour les streams top-level avec POST /search (invoices, credit_notes, deliveries, orders, estimates,
          deposit_invoices) : tire uniquement les documents créés dans les N derniers jours. Default = 36500 (~100 ans, donc
          filtre inactif). Pour un sync "rolling window" en prod, descendre à 90. NB : typé string car la concaténation Jinja
          `''P'' + config[''lookback_days''] + ''D''` plante quand le CDK reçoit un integer (le filtre `|string` ne suffit pas
          dans le Builder Test).'
    additionalProperties: true
type: DeclarativeSource
check:
  type: CheckStream
  stream_names:
  - invoices
streams:
- name: invoices
  type: DeclarativeStream
  # POC INCREMENTAL — Option D : cursor `created` + start_time_option sur
  # filters.created.start. start_datetime statique pour passer le DISCOVER
  # (le Jinja plante Pydantic à cette étape). lookback_days reste exposé
  # dans le spec mais pas câblé pour le moment — à corriger via MinMaxDatetime.
  incremental_sync:
    type: DatetimeBasedCursor
    cursor_field: created
    datetime_format: "%Y-%m-%dT%H:%M:%S%z"
    start_datetime: "2010-01-01T00:00:00+0000"
    start_time_option:
      type: RequestOption
      inject_into: body_json
      field_path:
        - filters
        - created
        - start
  retriever:
