api_budget:
  type: HTTPAPIBudget
  policies:
  - type: MovingWindowCallRatePolicy
    rates:
    - limit: 120
      interval: PT1M
    - limit: 18
      interval: PT1S
    matchers:
    - url_path_pattern: .*
  ratelimit_remaining_header: X-Quota-Remaining-By-Minute
  status_codes_for_ratelimit_hit:
  - 429
definitions:
  linked:
    HttpRequester:
      request_body:
        type: RequestBodyJsonObject
        value:
          filters: {}
      authenticator:
        type: OAuthAuthenticator
        client_id: '{{ config[''client_id''] }}'
        grant_type: client_credentials
        client_secret: '{{ config[''client_secret''] }}'
        refresh_request_body: {}
        token_refresh_endpoint: https://login.sellsy.com/oauth2/access-tokens
      request_headers:
        Content-Type: application/x-www-form-urlencoded
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          field_name: limit
          inject_into: request_parameter
        page_token_option:
          type: RequestOption
          field_name: offset
          inject_into: request_parameter
        pagination_strategy:
          type: CursorPagination
          page_size: 100
          cursor_value: '{{ response.pagination.offset }}'
          stop_condition: '{{ response.pagination.count < response.pagination.limit }}'
