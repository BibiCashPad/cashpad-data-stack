spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - client_id
      - client_secret
    properties:
      client_id:
        type: string
        order: 0
        title: Client ID
        airbyte_secret: true
      client_secret:
        type: string
        order: 1
        title: Client secret
        airbyte_secret: true
      lookback_days:
        type: integer
        order: 2
        title: Lookback period (days)
        description: >-
          Pour les streams top-level avec POST /search (invoices,
          credit_notes, deliveries, orders, estimates, deposit_invoices) :
          tire uniquement les documents créés dans les N derniers jours.
          Default = 36500 (~100 ans, donc filtre inactif).
          Pour un sync "rolling window" en prod, descendre à 90.
        default: 36500
        minimum: 1
    additionalProperties: true

