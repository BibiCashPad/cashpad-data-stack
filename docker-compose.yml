name: cashpad-data-stack

# ──────────────────────────────────────────────────────────────────────────
# Stack data dev — Postgres + dbt + Dagster + Metabase
#
# Airbyte n'est PAS dans ce compose : installé séparément via `abctl`
# (l'outil officiel Airbyte, qui spinne un kind cluster). Voir README.
#
# Démarrage rapide :
#   cp .env.example .env
#   docker compose up -d
#   docker compose run --rm dbt dbt run    # exécuter dbt
#
# Interfaces web :
#   Metabase           → http://localhost:3000
#   Dagster (Dagit)    → http://localhost:3001
#   Airbyte (abctl)    → http://localhost:8000
#   Postgres           → localhost:5432
# ──────────────────────────────────────────────────────────────────────────

x-postgres-env: &postgres-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

services:
  # ────────────────────────────────────────────────────────────────
  # PostgreSQL — warehouse (raw + analytics) + metadata DBs partagés
  # ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: data-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [data-stack]

  # ────────────────────────────────────────────────────────────────
  # dbt — modélisation & transformation
  # Container "sidecar" : on lance les commandes via `docker compose run --rm dbt …`
  # ────────────────────────────────────────────────────────────────
  dbt:
    build: ./dbt
    container_name: data-dbt
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *postgres-env
      DBT_PROFILES_DIR: /workdir
    volumes:
      - ./dbt:/workdir
    working_dir: /workdir
    networks: [data-stack]
    profiles: ["tools"]   # n'est pas lancé par défaut, à utiliser avec `run --rm dbt …`

  # ────────────────────────────────────────────────────────────────
  # Metabase — dataviz
  # ────────────────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.51.10
    container_name: data-metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    networks: [data-stack]

  # ────────────────────────────────────────────────────────────────
  # Dagster — orchestration (webserver + daemon)
  # ────────────────────────────────────────────────────────────────
  dagster-webserver:
    build: ./dagster
    image: cashpad-dagster
    container_name: data-dagster-webserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      <<: *postgres-env
      DAGSTER_HOME: /opt/dagster/dagster_home
      DBT_PROFILES_DIR: /opt/dagster/dbt
      DBT_PROJECT_DIR: /opt/dagster/dbt
      DAGSTER_IS_DEV_CLI: "1"
    volumes:
      - ./dagster:/opt/dagster/app
      - ./dagster/dagster_home:/opt/dagster/dagster_home
      - ./dbt:/opt/dagster/dbt
    working_dir: /opt/dagster/app
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
    networks: [data-stack]

  dagster-daemon:
    build: ./dagster
    image: cashpad-dagster
    container_name: data-dagster-daemon
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      dagster-webserver:
        condition: service_started
    environment:
      <<: *postgres-env
      DAGSTER_HOME: /opt/dagster/dagster_home
      DBT_PROFILES_DIR: /opt/dagster/dbt
      DBT_PROJECT_DIR: /opt/dagster/dbt
      DAGSTER_IS_DEV_CLI: "1"
    volumes:
      - ./dagster:/opt/dagster/app
      - ./dagster/dagster_home:/opt/dagster/dagster_home
      - ./dbt:/opt/dagster/dbt
    working_dir: /opt/dagster/app
    command: ["dagster-daemon", "run"]
    networks: [data-stack]

volumes:
  postgres-data:

networks:
  data-stack:
    driver: bridge
